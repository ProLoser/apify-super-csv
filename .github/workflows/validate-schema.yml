name: Validate schema

on:
  push:
  pull_request:

jobs:
  validate-schema:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install -g apify-cli
      - run: apify validate-schema
